<!doctype html>
<head>
  <link rel="stylesheet" href="https://dev.oseale.com/css/color-ldr.css">
  <style>
    body {
      background: radial-gradient(circle at center, #1a2a2a 0%, #000000 100%);
    }
    .ldr {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .link-card {
      background: rgba(255, 255, 255, 0.05); /* Very faint white */
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 207, 238, 0.3); /* Miku Cyan border */
      border-radius: 20px;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
    }

    .hexagon, .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); 
      margin: 0;
      padding: 0;
  }
  .link-button {
    background: transparent;
    border: 1px solid #00CFEE;
    color: white;
    transition: all 0.3s ease;
  }
  
  .link-button:hover {
    background: #00CFEE;
    box-shadow: 0 0 20px rgba(0, 207, 238, 0.6);
    color: #000; /* Text turns black when background glows */
    transform: translateY(-2px);
  }
  </style>
</head>
<body>
  <div class="ldr">
      <svg class="hexagon" viewBox="0 0 50 50">
          <polygon points="10,25 17.5,12 32.5,12 40,25 32.5,38 17.5,38"></polygon>
      </svg>
      <svg class="ring" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="22"></circle>
      </svg>
  </div>
  <div class="link-card">
    <h1>oseale links</h1>
    <button class="link-button"></button>
  </div>
</body>
</html>
